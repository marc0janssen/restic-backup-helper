name: Docs

on:
  push:
    branches:
      - main
      - develop
    paths:
      - docs/**
      - mkdocs.yml
      - CHANGELOG.md
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - CHANGELOG.md
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs Material
        run: |
          set -eux
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build site (strict)
        run: |
          set -eux
          mkdocs build --strict --site-dir site

      # Re-runs of a failed job (or an internal retry of the upload step)
      # can leave a stale "github-pages" artifact attached to this workflow
      # run, which makes actions/deploy-pages fail with:
      #   Multiple artifacts named "github-pages" were unexpectedly found …
      # Delete any leftover before uploading so deploy-pages always sees
      # exactly one artifact. See actions/upload-pages-artifact#97.
      - name: Delete stale Pages artifact (if any)
        if: github.event_name != 'pull_request'
        uses: geekyeggo/delete-artifact@v6
        with:
          name: github-pages
          failOnError: false

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    # Deploy only from main: GitHub's github-pages environment protection
    # rule restricts deployments to main, and main is the long-term
    # production branch. develop still runs the build job above for strict
    # validation of every push / PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
