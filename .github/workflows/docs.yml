name: Docs

on:
  push:
    branches:
      - main
      - develop
    paths:
      - docs/**
      - mkdocs.yml
      - CHANGELOG.md
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - CHANGELOG.md
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Opt in before GitHub switches JavaScript actions from Node.js 20 to 24
  # by default. This keeps Pages artifact upload/deploy warnings out of CI.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs Material
        run: |
          set -eux
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build site (strict)
        run: |
          set -eux
          mkdocs build --strict --site-dir site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    # Deploy from both main (production) and develop (preview), because the
    # docs site currently lives on develop until the next release merge to
    # main. Concurrency: pages (above) prevents overlapping deploys.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
