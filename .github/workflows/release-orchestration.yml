name: Release Orchestration

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install quality tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run quality checks
        env:
          CI_CONVENTIONAL_COMMIT_RANGE: HEAD~20..HEAD
        run: |
          chmod +x ./scripts/ci-quality-checks.sh
          ./scripts/ci-quality-checks.sh

      - name: Run smoke test
        run: |
          chmod +x ./scripts/ci-smoke-test.sh
          ./scripts/ci-smoke-test.sh

      - name: Run Trivy SARIF scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM,LOW
          scanners: vuln,misconfig,secret

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce release security gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-release-gate.txt
          exit-code: 1
          trivyignores: .trivyignore
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln,misconfig,secret

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-orchestration-diagnostics
          path: |
            trivy-results.sarif
            trivy-release-gate.txt
