name: Smoke Test

on:
  push:
  pull_request:

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run runtime smoke test
        run: |
          chmod +x ./scripts/ci-smoke-test.sh
          chmod +x ./ci/smoke-hooks/*.sh
          ./scripts/ci-smoke-test.sh

      - name: Collect smoke logs on failure
        if: failure()
        run: |
          docker compose -f ci/docker-compose.smoke.yml logs --no-color > smoke-failure-logs.txt || true
          docker compose -f ci/docker-compose.smoke.yml ps > smoke-failure-ps.txt || true

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-failure-diagnostics
          path: |
            smoke-failure-logs.txt
            smoke-failure-ps.txt
