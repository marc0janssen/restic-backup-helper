# Example Compose stack - copy to your host and provide values via `.env`
# (same directory) or exported variables. Do not commit `.env`, real secrets,
# rclone.conf, or msmtp credentials.
#
# Required at runtime at minimum:
# - RESTIC_REPOSITORY
# - ./restic.password (or switch to RESTIC_PASSWORD in environment)
# - RESTIC_TAG
# - BACKUP_CRON
# - at least one source volume mounted at BACKUP_ROOT_DIR
#
# Optional Compose profiles (use `--profile` to opt in):
#   metrics : adds a node-exporter sidecar that scrapes METRICS_DIR
#             (`docker compose --profile metrics up`)
#   dev     : adds a mailhog SMTP catcher for local testing of mail
#             notifications (`docker compose --profile dev up`)
# The main `restic-backup` service has no `profiles:` key, so it is always
# included regardless of profile selection.

services:
  restic-backup:
    image: marc0janssen/restic-backup-helper:latest
    container_name: restic-backup-helper
    hostname: ${RESTIC_HOSTNAME:-backup-node}
    restart: unless-stopped

    # Needed for `restic mount` and for reading source paths under tight ACLs.
    cap_add:
      - DAC_READ_SEARCH
      - SYS_ADMIN
    devices:
      - /dev/fuse

    environment:
      # Restic core
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:?set RESTIC_REPOSITORY in .env or shell}
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      # RESTIC_PASSWORD: ${RESTIC_PASSWORD} # less secure fallback
      RESTIC_TAG: ${RESTIC_TAG:-daily}
      RESTIC_CACHE_DIR: ${RESTIC_CACHE_DIR:-/.cache/restic}
      RESTIC_CACERT: ${RESTIC_CACERT:-}
      RESTIC_CHECK_REPOSITORY_STATUS: ${RESTIC_CHECK_REPOSITORY_STATUS:-ON}
      RESTIC_AUTO_UNLOCK: ${RESTIC_AUTO_UNLOCK:-OFF}

      # Backup job
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      BACKUP_ROOT_DIR: ${BACKUP_ROOT_DIR:-/data}
      RESTIC_JOB_ARGS: ${RESTIC_JOB_ARGS:---exclude-file /config/exclude_files.txt}
      RESTIC_FORGET_ARGS: ${RESTIC_FORGET_ARGS:---retry-lock=5m --keep-daily 7 --keep-weekly 5 --keep-monthly 12 --keep-yearly 10}

      # Optional check job
      CHECK_CRON: ${CHECK_CRON:-37 3 * * 0}
      RESTIC_CHECK_ARGS: ${RESTIC_CHECK_ARGS:-}

      # Optional standalone forget worker. When set, /bin/backup skips
      # its inline post-backup forget so the exclusive forget-lock is
      # only ever taken by this dedicated window — recommended for
      # repositories shared by multiple hosts.
      FORGET_CRON: ${FORGET_CRON:-}
      # Optional standalone prune job
      PRUNE_CRON: ${PRUNE_CRON:-0 4 * * 0}
      RESTIC_PRUNE_ARGS: ${RESTIC_PRUNE_ARGS:---max-unused 10%}

      # Optional Rclone replicate job (bisync/sync/copy)
      RCLONE_CONFIG: ${RCLONE_CONFIG:-/config/rclone.conf}
      REPLICATE_JOB_FILE: ${REPLICATE_JOB_FILE:-/config/replicate_jobs.txt}
      REPLICATE_JOB_ARGS: ${REPLICATE_JOB_ARGS:---exclude-from /config/exclude_sync.txt}
      REPLICATE_CRON: ${REPLICATE_CRON:-}
      REPLICATE_VERBOSE: ${REPLICATE_VERBOSE:-ON}
      REPLICATE_BISYNC_CHECK_ACCESS: ${REPLICATE_BISYNC_CHECK_ACCESS:-OFF}

      # Optional NFS repository mount; usually keep RESTIC_REPOSITORY=/mnt/restic.
      NFS_TARGET: ${NFS_TARGET:-}

      # Optional mail notifications via /etc/msmtprc.
      MAILX_RCPT: ${MAILX_RCPT:-}
      MAILX_ON_ERROR: ${MAILX_ON_ERROR:-ON}

      # Optional webhook notifications.
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_HEADER_AUTH: ${WEBHOOK_HEADER_AUTH:-}
      WEBHOOK_TIMEOUT: ${WEBHOOK_TIMEOUT:-15}
      WEBHOOK_ON_ERROR: ${WEBHOOK_ON_ERROR:-OFF}

      # Optional Prometheus textfile collector.
      # When set together with the `metrics` profile, the node-exporter sidecar
      # below scrapes <volume backup-logs>/textfile_collector for restic_*.prom.
      METRICS_DIR: ${METRICS_DIR:-/var/log/textfile_collector}

      # Optional hook timeout in seconds; 0 disables timeout enforcement.
      HOOK_TIMEOUT: ${HOOK_TIMEOUT:-300}

      # Log rotation
      ROTATE_LOG_CRON: ${ROTATE_LOG_CRON:-0 0 * * 6}
      CRON_LOG_MAX_SIZE: ${CRON_LOG_MAX_SIZE:-1048576}
      MAX_CRON_LOG_ARCHIVES: ${MAX_CRON_LOG_ARCHIVES:-5}

      # Locale / time
      TZ: ${TZ:-Europe/Amsterdam}

    secrets:
      - restic_password

    healthcheck:
      # Local liveness probe: keep remote repository reachability in monitoring
      # instead of restarting a healthy cron container during transient outages.
      test: ["CMD-SHELL", "test -f /var/log/cron.log && pidof crond >/dev/null"]
      interval: 1m
      timeout: 5s
      start_period: 1m
      start_interval: 10s

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config:ro
      - ./config/msmtprc:/etc/msmtprc:ro # create from config/msmtprc.example
      - ./hooks:/hooks:ro
      - backup-logs:/var/log
      - restic-cache:/.cache/restic
      - /srv/documents:/data:ro
      # - /mnt/restic:/mnt/restic
      # - ./restore:/restore
      # - ~/.ssh:/root/.ssh:ro

    command: ["tail", "-fn0", "/var/log/cron.log"]

  # ── Profile: metrics ────────────────────────────────────────────────────────
  # Run with: docker compose --profile metrics up
  # Scrapes the same volume that holds METRICS_DIR (default subdir
  # `textfile_collector` under /var/log) so node-exporter exposes the
  # restic_<job>_last_* gauges over HTTP on 127.0.0.1:9100. Skip this sidecar
  # entirely when you already have a host-level node-exporter scraping the
  # same path on the host. The flag set below disables the kernel/system
  # collectors so this sidecar only exports the textfile metrics.
  node-exporter:
    image: prom/node-exporter:latest
    container_name: restic-node-exporter
    hostname: ${RESTIC_HOSTNAME:-backup-node}-exporter
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - --collector.textfile.directory=/var/log/textfile_collector
      - --collector.disable-defaults
      - --collector.textfile
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - backup-logs:/var/log:ro

  # ── Profile: dev ────────────────────────────────────────────────────────────
  # Run with: docker compose --profile dev up
  # Local SMTP sink for testing mail notifications without a real relay.
  # Point your msmtprc at host=mailhog port=1025 (no auth, no TLS) and view
  # captured mail at http://localhost:8025.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: restic-mailhog
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

secrets:
  restic_password:
    file: ./restic.password

volumes:
  backup-logs:
  restic-cache:
